<form
  (ngSubmit)="onSubmit()"
  class="glass-card"
  novalidate
  aria-label="Investment calculator inputs"
>
  <div class="input-group">
    <div class="field">
      <label for="initial_investment">Initial Investment</label>
      <input
        id="initial_investment"
        type="number"
        name="initial_investment"
        [(ngModel)]="initialInvestment"
        placeholder="e.g. 5000"
        (keydown)="preventInvalidCharacters($event)"
        aria-label="Initial investment in EUR"
        inputmode="decimal"
        min="0"
        autocomplete="off"
      />
    </div>

    <div class="field">
      <label for="annual_investment">Annual Investment</label>
      <input
        id="annual_investment"
        type="number"
        name="annual_investment"
        [(ngModel)]="annualInvestment"
        placeholder="e.g. 1200"
        (keydown)="preventInvalidCharacters($event)"
        aria-label="Annual investment in EUR"
        inputmode="decimal"
        min="0"
        autocomplete="off"
      />
    </div>
  </div>

  <div class="input-group">
    <div class="field">
      <label for="expected_return">Expected Return (%)</label>
      <input
        id="expected_return"
        type="number"
        name="expected_return"
        [(ngModel)]="expectedReturn"
        placeholder="e.g. 7"
        (keydown)="preventInvalidCharacters($event)"
        aria-label="Expected annual return in percent"
        inputmode="decimal"
        min="0"
        autocomplete="off"
      />
    </div>

    <div class="field">
      <label for="duration">Duration (years)</label>
      <input
        id="duration"
        type="number"
        name="duration"
        [(ngModel)]="duration"
        placeholder="e.g. 10"
        (keydown)="preventInvalidCharacters($event)"
        aria-label="Investment duration in years"
        inputmode="numeric"
        min="1"
        autocomplete="off"
      />
    </div>
  </div>

  <button type="submit" class="cta" aria-label="Calculate investment results">
    <span>Calculate</span>
  </button>
</form>
